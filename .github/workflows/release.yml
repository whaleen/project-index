name: Release

on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: |
          cd cli
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp cli/target/${{ matrix.target }}/release/px dist/px
          tar -C dist -czf project-index-${RELEASE_TAG}-${{ matrix.target }}.tar.gz px
          shasum -a 256 project-index-${RELEASE_TAG}-${{ matrix.target }}.tar.gz > project-index-${RELEASE_TAG}-${{ matrix.target }}.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            project-index-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            project-index-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256

  update-tap:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download checksums
        run: |
          gh release download ${RELEASE_TAG} --pattern "*.sha256" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse sha256 values
        run: |
          ARM_SHA=$(cat project-index-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          X86_SHA=$(cat project-index-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          VERSION=${RELEASE_TAG#v}
          echo "ARM_SHA=$ARM_SHA" >> $GITHUB_ENV
          echo "X86_SHA=$X86_SHA" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/whaleen/homebrew-tap.git
          cd homebrew-tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/project-index.rb
          sed -i "s/sha256 \"[^\"]*\" # aarch64/sha256 \"${ARM_SHA}\" # aarch64/" Formula/project-index.rb
          sed -i "s/sha256 \"[^\"]*\" # x86_64/sha256 \"${X86_SHA}\" # x86_64/" Formula/project-index.rb
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/project-index.rb
          git commit -m "bump project-index to ${VERSION}"
          git push
